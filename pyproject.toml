[project]
name = "xian-vl"
version = "1.0.0"
description = "Screen OCR & Translation Tool - Real-time text extraction and translation from your screen"
readme = "README.md"
requires-python = ">=3.10, <3.14"
license = {text = "GPL-3.0-or-later"}
dependencies = [
    "PyQt6>=6.6",
    "Pillow>=10.0",
    "imagehash>=4.3",
    "lmdb>=1.4",
    "opencv-python-headless>=4.8",
    "numpy>=1.24",
    "pynvml>=12.0",
]

[project.optional-dependencies]
cuda = [
    "torch>=2.1",
    "vllm>=0.11",
]
rocm = [
    "torch>=2.1",
    "vllm>=0.11",
]
cpu = [
    "torch>=2.1",
    "torchvision>=0.16",
    "transformers>=4.40",
    "bitsandbytes>=0.44",
    "accelerate>=0.34",
]

[project.scripts]
xian = "xian.main:main"
