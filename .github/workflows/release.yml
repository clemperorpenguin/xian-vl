name: MAGE Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lemonade:
    name: Build Embeddable Lemonade (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            preset: windows
            artifact_name: lemonade-embeddable-windows-x64
          - os: macos-latest
            preset: default
            artifact_name: lemonade-embeddable-macos-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake and Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }} -DBUILD_WEB_APP=OFF
        working-directory: lemonade

      - name: Build Embeddable Target
        run: cmake --build --preset ${{ matrix.preset }} --target embeddable
        working-directory: lemonade

      - name: Stage Embeddable Directory
        run: |
          rm -f lemonade/build/*.zip
          rm -f lemonade/build/*.tar.gz
          mv lemonade/build/lemonade-embeddable-* lemonade/build/lemonade_dist
        shell: bash

      - name: Upload Lemonade Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: lemonade/build/lemonade_dist/

  build-mage:
    name: Build MAGE Client (${{ matrix.os }})
    needs: build-lemonade
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            lemonade_artifact: lemonade-embeddable-windows-x64
          - os: macos-latest
            lemonade_artifact: lemonade-embeddable-macos-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python@3.11
          BREW_PREFIX=$(brew --prefix)
          echo "$BREW_PREFIX/opt/python@3.11/libexec/bin" >> $GITHUB_PATH
        shell: bash

      - name: Create Virtual Environment (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv venv
          echo "VIRTUAL_ENV=venv" >> $env:GITHUB_ENV
          echo "PATH=venv\Scripts;$env:PATH" >> $env:GITHUB_ENV

      - name: Create Virtual Environment (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m venv venv
          echo "VIRTUAL_ENV=venv" >> $GITHUB_ENV
          echo "PATH=venv/bin:$PATH" >> $GITHUB_ENV

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling pyinstaller
          pip install -e packages/shared-types
          pip install -e packages/xian-vl
          pip install -e apps/mage-client

      - name: Download Lemonade Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.lemonade_artifact }}
          path: lemonade_extracted

      - name: Build Lite Version
        run: python scripts/build_mage.py

      - name: Build Full Version
        run: python scripts/build_mage.py --include-lemonade --lemonade-dir lemonade_extracted

      - name: Upload MAGE Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mage-client-${{ runner.os }}
          path: |
            apps/mage-client/*.zip
            apps/mage-client/*.dmg

  release:
    name: Create GitHub Release
    needs: build-mage
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mage-client-Windows
          path: artifacts/Windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mage-client-macOS
          path: artifacts/macOS

      - name: Prepare Release Files
        run: |
          mkdir -p release_dist
          find artifacts/ -type f \( -name "*.zip" -o -name "*.dmg" \) -exec cp {} release_dist/ \;
          ls -la release_dist/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
