[project]
name = "shared-types"
version = "2.0.0"
description = "Canonical data models and enums for the Xian ecosystem"
requires-python = ">=3.10, <3.14"
license = {text = "GPL-3.0-or-later"}
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_types"]
