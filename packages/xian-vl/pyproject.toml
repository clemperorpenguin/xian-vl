[project]
name = "xian-vl"
version = "2.0.0"
description = "Core AI translation engine — prompt engineering, context management, and Lemonade orchestration"
requires-python = ">=3.10, <3.14"
license = {text = "GPL-3.0-or-later"}
dependencies = [
    "Pillow>=10.0",
    "openai>=1.0.0",
    "numpy>=1.24",
    "opencv-python-headless>=4.8",
    "imagehash>=4.3",
    "lmdb>=1.4",
    "httpx>=0.27",
    "shared-types",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/xian"]

[tool.uv.sources]
shared-types = { workspace = true }
